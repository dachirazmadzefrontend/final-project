<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Gaming Blog</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <h1 class="site-title">Gaming <span>Blog</span></h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="articles.html">Articles</a>
            <a href="news.html">News</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="main-layout">
        <section>
            <h2>Our Social Media</h2>
            <div class="social-links-card">
                <p>stay up to date on updates coming to our site!</p>
                <div class="social-grid">
                    <a href="x.com" target="_blank" class="social-box tw">
                        <i class="fa-brands fa-twitter"></i>
                        <span>Twitter</span>
                    </a>
                    <a href="discord.com" target="_blank" class="social-box ds">
                        <i class="fa-brands fa-discord"></i>
                        <span>Discord</span>
                    </a>
                    <a href="youtube.com" target="_blank" class="social-box yt">
                        <i class="fa-brands fa-youtube"></i>
                        <span>YouTube</span>
                    </a>
                    <a href="https://github.com/dachirazmadzefrontend/final-project" target="_blank" class="social-box gh">
                        <i class="fa-brands fa-github"></i>
                        <span>GitHub</span>
                    </a>
                </div>
            </div>
        </section>
        <section>
            <h2>Contact Support</h2>
            <div class="featured-post">
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" required placeholder="Enter your name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="name@example.com">
                    </div>

                    <div class="form-group">
                        <label for="message">Message / Inquiry</label>
                        <textarea id="message" name="message" required placeholder="How can we help you?"></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Submit Form</button>
                </form>
            </div>
        </section>

    </main>

    <footer>
    <div class="footer-content">
        <a href="https://tbcbank.ge/ka/tbc-education" target="_blank" rel="noopener noreferrer" class="logo-link">
            <img src="images/tbc-logo.png" alt="TBC Logo" class="footer-logo">
        </a>
        <p>&copy; 2026 Gaming Blog Site. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
